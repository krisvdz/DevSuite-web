# ═══════════════════════════════════════════════════════════════════════════
# NGINX CONFIG — Configuração do servidor web para o SPA React
# ═══════════════════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 📚 CONCEITO: Gzip compression
    # Comprime os arquivos antes de enviar ao browser.
    # JS e CSS comprimem muito bem (~70% menor).
    # O browser descomprime automaticamente (Accept-Encoding: gzip).
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1024;

    # Cache de assets com hash no nome (gerados pelo Vite)
    # Ex: assets/index-Dh7bFvY8.js — hash muda quando o conteúdo muda
    location /assets/ {
        # Cache de 1 ano — como o nome contém hash, é seguro
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Redireciona todas as rotas para index.html (necessário para SPAs)
    location / {
        # 1. Tenta servir o arquivo exato
        # 2. Tenta servir como diretório
        # 3. Fallback para index.html (React Router cuida do resto)
        try_files $uri $uri/ /index.html;

        # index.html não deve ter cache (garante que o usuário sempre
        # receba a versão mais recente da app)
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Health check do container
    location /health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}
